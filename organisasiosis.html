    function openModal(p) {
      if(!p) return;
      document.getElementById('m-nama').innerText = p.nama;
      document.getElementById('m-jabatan').innerText = p.jabatan;
      document.getElementById('m-kelas').innerText = p.kelas;
      document.getElementById('m-nisn').innerText = p.nisn;
      document.getElementById('m-tgl').innerText = p.tgl;
      document.getElementById('m-foto').src = p.foto;
      document.getElementById('m-moto').innerText = `"${p.moto}"`; // Set moto ke elemen
      document.getElementById('modal').classList.add('modal-active');
      document.getElementById('modal-content').classList.replace('scale-95', 'scale-100');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('modal-active');
      document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
    }

        bendahara: 'from-pink-500 to-rose-500'
      };

      // Jika type tidak ditemukan di daftar atas, gunakan warna abu-abu (slate)
      const g = colors[type] || 'from-slate-500 to-slate-600';

      return `
        <div onclick='openModal(${JSON.stringify(data)})' class="org-card bg-slate-800/80 backdrop-blur-sm rounded-3xl p-6 border border-slate-700 shadow-xl" style="animation-delay: ${delay}ms;">
          <div class="flex flex-col items-center">
            <div class="avatar-ring mb-4"><img src="${data.foto}" class="w-20 h-20 rounded-full border-4 border-slate-800 object-cover"></div>
            <span class="inline-block px-3 py-1 rounded-full text-[8px] font-black mb-3 bg-gradient-to-r ${g} text-white uppercase tracking-widest">${data.jabatan}</span>
            <h3 class="font-bold text-white text-sm text-center mb-1">${data.nama}</h3>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-tighter">Kelas ${data.kelas}</p>
          </div>
        </div>
      `;
    }

   function createSeksiCard(s, delay = 0) {
  return `
    <div class="org-card bg-slate-800/50 backdrop-blur-sm rounded-3xl p-6 border border-slate-700 shadow-xl" style="animation-delay: ${delay}ms;">
      <div class="flex items-center gap-3 mb-5">
        <span class="text-3xl">${s.icon}</span>
        <h4 class="font-black text-white text-[9px] uppercase tracking-widest leading-none">${s.bidang}</h4>
      </div>

      ${s.pembina ? `
      <div onclick='openModal(${JSON.stringify(s.pembina)})' class="flex items-center gap-3 p-3 rounded-2xl bg-amber-500/10 mb-3 border border-amber-500/20 hover:bg-amber-500/20 transition-all cursor-pointer">
        <div class="relative">
          <img src="${s.pembina.foto}" class="w-10 h-10 rounded-full border-2 border-amber-500/30 object-cover">
          <div class="absolute -bottom-1 -right-1 bg-amber-500 rounded-full p-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2 text-slate-900" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
          </div>
        </div>
        <div>
          <p class="text-[7px] font-black uppercase text-amber-500">Pembina Sekbid</p>
          <p class="text-[10px] font-bold text-white leading-tight">${s.pembina.nama}</p>
        </div>
      </div>
      ` : ''}

      <div onclick='openModal(${JSON.stringify(s.koordinator)})' class="flex items-center gap-3 p-3 rounded-2xl bg-blue-500/10 mb-4 border border-blue-500/20 hover:bg-blue-500/20 transition-all cursor-pointer">
        <img src="${s.koordinator.foto}" class="w-10 h-10 rounded-full border border-blue-500/30 object-cover">
        <div>
          <p class="text-[7px] font-black uppercase text-blue-400">Koordinator</p>
          <p class="text-[11px] font-bold text-white">${s.koordinator.nama}</p>
        </div>
      </div>

      <div class="space-y-2">
        ${s.anggota.map(a => `
          <div onclick='openModal(${JSON.stringify(a)})' class="flex items-center gap-3 p-2 rounded-xl bg-white/5 hover:bg-white/10 transition-all cursor-pointer">
            <img src="${a.foto}" class="w-7 h-7 rounded-full border border-white/10 object-cover">
            <p class="text-[10px] font-medium text-slate-300">${a.nama}</p>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

   function render() {
      const d = osisData[currentPeriod];
      document.getElementById('period-tabs').innerHTML = periods.map(p => `
        <button onclick="switchPeriod('${p}')" class="period-tab px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest ${p === currentPeriod ? 'active bg-white text-blue-600 shadow-xl' : 'bg-slate-800 text-slate-500 border border-slate-700 hover:text-slate-300'}">${p}</button>
      `).join('');

      document.getElementById('main-content').innerHTML = `
        <div class="space-y-24">
          ${d.pembinaOsis ? `
          <section class="max-w-xs mx-auto mb-12">
            <h2 class="text-center text-amber-500 font-black text-[10px] tracking-[0.5em] mb-6 uppercase italic">Pembina Utama</h2>
            ${createCard(d.pembinaOsis, 'pembina', 50)}
          </section>
          ` : ''}

          <section class="max-w-2xl mx-auto grid md:grid-cols-2 gap-8">
            ${createCard(d.ketua, 'ketua', 100)}
            ${createCard(d.wakilKetua, 'wakil', 200)}
          </section>

          <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            ${d.sekretaris.map((s,i) => createCard(s, 'sekretaris', 100+i*50)).join('')}
            ${d.bendahara.map((b,i) => createCard(b, 'bendahara', 200+i*50)).join('')}
          </section>

          <section>
            <h2 class="text-center text-slate-500 font-black text-[10px] tracking-[0.5em] mb-12 uppercase italic">Seksi-Seksi Bidang OSIS</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${d.seksi.map((s, i) => createSeksiCard(s, i*50)).join('')}
            </div>
          </section>
        </div>
      `;
    }

    function switchPeriod(p) { currentPeriod = p; render(); }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeModal(); }
    render();
  </script>
</body>
</html>
